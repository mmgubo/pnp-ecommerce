services:

  db:
    image: postgres:16-alpine
    container_name: pnp-db
    environment:
      POSTGRES_DB: pnpdb
      POSTGRES_USER: ${POSTGRES_USER:-pnp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pnp}
    ports:
      - "5432:5432"          # accessible from the host for tools like DBeaver / psql
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pnp} -d pnpdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  ecommerce:
    build: .
    image: pnp-ecommerce:local
    container_name: pnp-ecommerce
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-admin}
      APP_SECURITY_PASSWORD: ${APP_SECURITY_PASSWORD:-secret}
      POSTGRES_USER: ${POSTGRES_USER:-pnp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pnp}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/products"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pnp-pgadmin
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pnp.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
