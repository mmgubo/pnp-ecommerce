services:
  ecommerce:
    build: .
    image: pnp-ecommerce:local
    container_name: pnp-ecommerce
    ports:
      - "8080:8080"
    environment:
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-admin}
      APP_SECURITY_PASSWORD: ${APP_SECURITY_PASSWORD:-secret}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
    healthcheck:
      # Public GET endpoint — no auth required, exercises the full web + JPA stack.
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/products"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
