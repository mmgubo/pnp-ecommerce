# =============================================================================
# Docker profile — overrides application.properties when SPRING_PROFILES_ACTIVE=docker
# Connects to the PostgreSQL container defined in docker-compose.yml.
# =============================================================================

spring.datasource.url=jdbc:postgresql://db:5432/pnpdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:pnp}
spring.datasource.password=${POSTGRES_PASSWORD:pnp}
spring.sql.init.mode=never
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# H2 console is not applicable in this profile.
spring.h2.console.enabled=false
