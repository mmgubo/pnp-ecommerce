spring.application.name=pnp-ecommerce

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:pnpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# Schema is managed explicitly via schema.sql so the DDL is visible and reviewable.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Load schema.sql then data.sql after JPA is initialised.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# H2 web console (kept open for local inspection)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Basic Auth credentials. Override in production via APP_SECURITY_USERNAME / APP_SECURITY_PASSWORD.
app.security.username=${APP_SECURITY_USERNAME:admin}
app.security.password=${APP_SECURITY_PASSWORD:secret}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
